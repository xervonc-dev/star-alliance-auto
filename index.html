<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUN</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(
        to bottom,
        #ff8c42 0%,
        #ffb347 30%,
        #3a6ea5 60%,
        #0f3057 100%
    );
}

.ocean {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: #1b4f72;
}

.sun {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: orange;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
}

.shadow {
    position: absolute;
    bottom: 35%;
    left: 75%;
    width: 30px;
    height: 80px;
    background: black;
}

.mug {
    position: absolute;
    width: 15px;
    height: 10px;
    background: white;
    left: -10px;
    top: 20px;
}

.title {
    position: absolute;
    top: 50px;
    width: 100%;
    text-align: center;
    font-size: 70px;
    color: white;
    font-weight: bold;
}

.menu {
    position: absolute;
    top: 250px;
    left: 50px;
}

button {
    display: block;
    margin: 10px;
    padding: 15px 40px;
    font-size: 24px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="sun"></div>
<div class="ocean"></div>

<div class="shadow">
    <div class="mug"></div>
</div>

<div class="title">RUN</div>

<div class="menu">
    <button onclick="alert('Game Coming Soon')">Play</button>
    <button onclick="alert('Settings Coming Soon')">Settings</button>
</div>

</body>
</html>
